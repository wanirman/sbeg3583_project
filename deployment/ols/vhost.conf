# OpenLiteSpeed Virtual Host Configuration
# Place in: /usr/local/lsws/conf/vhosts/biodiversity/vhconf.conf

docRoot                   $VH_ROOT/public
enableGzip                1
enableBr                  1

index {
  useServer               0
  indexFiles              index.html
}

# Serve PWA static assets — cache aggressively except HTML
rewrite {
  enable                  1
  rules                   <<<END_RULES
  RewriteEngine On

  # Force HTTPS
  RewriteCond %{HTTPS} off
  RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

  # Proxy /api and /socket.io to Node.js on port 3000
  RewriteCond %{REQUEST_URI} ^/(api|socket\.io)
  RewriteRule ^(.*)$ http://localhost:3000$1 [P,L]

  # SPA fallback — all other routes serve index.html
  RewriteCond %{REQUEST_FILENAME} !-f
  RewriteCond %{REQUEST_FILENAME} !-d
  RewriteRule ^ /index.html [L]
  END_RULES
}

# Cache control headers
expires {
  enableExpires           1
  expiresDefault          A3600
  expiresByType           text/html=A0
  expiresByType           application/javascript=A604800
  expiresByType           text/css=A604800
  expiresByType           image/*=A2592000
}

# Security headers
customResponseHeader {
  add                     Strict-Transport-Security "max-age=31536000; includeSubDomains"
  add                     X-Content-Type-Options    "nosniff"
  add                     X-Frame-Options           "SAMEORIGIN"
}
